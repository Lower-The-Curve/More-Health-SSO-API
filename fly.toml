app = "morehealth-dashboard"
primary_region = "sin"

[build]
  dockerfile = "dashboard/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
